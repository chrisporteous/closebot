<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>JIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --black: #000000;
            --green: #00D632;
            --green-dark: #00B82B;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F5;
            --gray-200: #E5E5E5;
            --gray-300: #D4D4D4;
            --gray-400: #A3A3A3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --blue: #006AFF;
            --orange: #FF6B00;
            --red: #FF3B30;
            --gold: #FFD700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--black);
            min-height: 100vh;
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 214, 50, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 214, 50, 0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes ringPulse { 0% { transform: scale(0.8); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
        
        /* Header */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--white);
            border-radius: 8px;
        }
        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* Deal Radar */
        .deal-radar {
            position: relative;
            width: 48px;
            height: 48px;
        }
        .radar-ring {
            position: absolute;
            inset: 0;
            border: 2px solid var(--green);
            border-radius: 50%;
            opacity: 0.3;
        }
        .radar-ring.active {
            opacity: 1;
            animation: glow 2s ease-in-out infinite;
        }
        .radar-fill {
            position: absolute;
            inset: 4px;
            background: conic-gradient(var(--green) var(--progress), transparent var(--progress));
            border-radius: 50%;
            transition: all 0.5s ease;
        }
        .radar-center {
            position: absolute;
            inset: 8px;
            background: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--green);
        }
        
        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 320px;
            min-height: 100vh;
            padding-top: 64px;
        }
        @media (max-width: 1024px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
        
        /* Conversation Area */
        .conversation {
            padding: 32px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
            animation: fadeIn 0.8s ease-out;
        }
        .hero h2 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(180deg, var(--white) 0%, var(--gray-400) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 18px;
            color: var(--gray-400);
            font-weight: 400;
        }
        
        /* Messages */
        .messages {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .msg {
            animation: slideUp 0.4s ease-out;
        }
        .msg.user {
            display: flex;
            justify-content: flex-end;
        }
        .msg.user .bubble {
            background: var(--green);
            color: var(--black);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            max-width: 70%;
            font-weight: 500;
        }
        .msg.bot .content {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 24px;
            padding: 24px;
        }
        
        /* Options Grid */
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }
        .opt {
            padding: 12px 20px;
            background: var(--gray-800);
            border: 1px solid var(--gray-700);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .opt:hover {
            background: var(--gray-700);
            border-color: var(--gray-600);
            transform: translateY(-2px);
        }
        .opt.primary {
            background: var(--green);
            border-color: var(--green);
            color: var(--black);
        }
        .opt.primary:hover {
            background: var(--green-dark);
            border-color: var(--green-dark);
        }
        .opt.selected {
            background: var(--green);
            border-color: var(--green);
            color: var(--black);
        }
        .opt .icon { font-size: 18px; }
        
        /* Section Labels */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        
        /* Stack Builder */
        .stack-builder {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .stack-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .stack-header h3 {
            font-size: 14px;
            font-weight: 600;
        }
        .stack-total {
            font-size: 14px;
            color: var(--green);
            font-weight: 600;
        }
        .stack-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
            padding: 12px;
            background: var(--gray-800);
            border-radius: 12px;
            border: 2px dashed var(--gray-700);
        }
        .stack-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--black);
            border-radius: 8px;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
        }
        .stack-item img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .stack-item .remove {
            color: var(--gray-500);
            cursor: pointer;
            margin-left: 4px;
        }
        .stack-item .remove:hover { color: var(--red); }
        .stack-empty {
            color: var(--gray-600);
            font-size: 13px;
            text-align: center;
            width: 100%;
            padding: 8px;
        }
        
        /* Product Cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        .product-card {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .product-card:hover {
            border-color: var(--green);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 214, 50, 0.1);
        }
        .product-card.in-stack {
            border-color: var(--green);
            background: rgba(0, 214, 50, 0.05);
        }
        .product-card .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--green);
            color: var(--black);
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .product-card img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }
        .product-card:hover img {
            transform: scale(1.05);
        }
        .product-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .product-card .price {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
        }
        .product-card .add-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: var(--gray-800);
            border: none;
            border-radius: 8px;
            color: var(--white);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-card .add-btn:hover {
            background: var(--green);
            color: var(--black);
        }
        .product-card.in-stack .add-btn {
            background: var(--green);
            color: var(--black);
        }
        /* AR Preview */
        .ar-preview {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }
        .ar-preview-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-800);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ar-preview-header h3 {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ar-canvas {
            position: relative;
            height: 300px;
            background: var(--gray-800);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ar-canvas img.bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .ar-canvas .placeholder {
            text-align: center;
            color: var(--gray-500);
        }
        .ar-canvas .placeholder .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .ar-product {
            position: absolute;
            cursor: move;
            transition: transform 0.1s;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }
        .ar-product img {
            height: 120px;
            pointer-events: none;
        }
        .ar-product.dragging {
            transform: scale(1.1);
            z-index: 100;
        }
        .ar-controls {
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--gray-800);
        }
        .ar-btn {
            flex: 1;
            padding: 12px;
            background: var(--gray-800);
            border: 1px solid var(--gray-700);
            border-radius: 10px;
            color: var(--white);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .ar-btn:hover {
            background: var(--gray-700);
        }
        .ar-btn.primary {
            background: var(--green);
            border-color: var(--green);
            color: var(--black);
        }
        
        /* Voice Button */
        .voice-btn {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--green);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 214, 50, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .voice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 214, 50, 0.5);
        }
        .voice-btn.listening {
            animation: glow 1s ease-in-out infinite;
        }
        .voice-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--black);
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--gray-900);
            border-left: 1px solid var(--gray-800);
            padding: 24px;
            overflow-y: auto;
            height: calc(100vh - 64px);
            position: sticky;
            top: 64px;
        }
        .sidebar-section {
            margin-bottom: 32px;
        }
        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        /* Profile Card */
        .profile-card {
            background: var(--gray-800);
            border-radius: 16px;
            padding: 16px;
        }
        .profile-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-700);
        }
        .profile-item:last-child { border: none; }
        .profile-item .label {
            color: var(--gray-500);
            font-size: 13px;
        }
        .profile-item .value {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Achievements */
        .achievements {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .achievement {
            width: 44px;
            height: 44px;
            background: var(--gray-800);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0.3;
            transition: all 0.3s;
        }
        .achievement.unlocked {
            opacity: 1;
            background: linear-gradient(135deg, var(--gold) 0%, #FFA500 100%);
        }
        .achievement.unlocked:hover {
            transform: scale(1.1);
        }
        
        /* Stats */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-800);
        }
        .stat-row:last-child { border: none; }
        .stat-label {
            color: var(--gray-500);
            font-size: 13px;
        }
        .stat-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
        }
        
        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 320px;
            padding: 20px 32px;
            background: linear-gradient(transparent, var(--black) 20%);
        }
        @media (max-width: 1024px) {
            .input-area { right: 0; }
        }
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 16px;
            padding: 8px;
        }
        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: var(--white);
            font-size: 15px;
            outline: none;
        }
        .input-container input::placeholder {
            color: var(--gray-600);
        }
        .send-btn {
            padding: 12px 20px;
            background: var(--green);
            border: none;
            border-radius: 10px;
            color: var(--black);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:hover {
            background: var(--green-dark);
        }
        
        /* Cards */
        .card {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
        }
        .card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-content {
            background: var(--gray-800);
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .card-footer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--gray-800);
            font-size: 13px;
            color: var(--gray-400);
        }
        
        /* Insight Banner */
        .insight {
            background: linear-gradient(135deg, rgba(0, 214, 50, 0.1) 0%, rgba(0, 214, 50, 0.05) 100%);
            border: 1px solid rgba(0, 214, 50, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .insight .icon {
            font-size: 20px;
        }
        .insight .text {
            flex: 1;
        }
        .insight .text strong {
            display: block;
            margin-bottom: 4px;
        }
        .insight .text p {
            font-size: 13px;
            color: var(--gray-400);
        }
        
        /* Video Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: var(--black);
            border-radius: 16px;
            overflow: hidden;
        }
        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--gray-800);
            border: none;
            border-radius: 50%;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Zoom Modal */
        .zoom-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: zoom-out;
        }
        .zoom-modal.show { display: flex; }
        .zoom-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        /* Floating Data Points */
        .float-data {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gray-700);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
        }
        .float-data .label {
            color: var(--gray-500);
            margin-bottom: 2px;
        }
        .float-data .value {
            font-weight: 600;
            color: var(--green);
        }
    </style>
</head><body>

// Voice recognition
var recognition = null;
var isListening = false;

function toggleVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("Voice not supported in this browser. Try Chrome.");
        return;
    }
    
    if (isListening) {
        recognition.stop();
        isListening = false;
        document.getElementById("voiceBtn").classList.remove("listening");
        return;
    }
    
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-GB";
    recognition.continuous = false;
    
    recognition.onresult = function(event) {
        var text = event.results[0][0].transcript;
        document.getElementById("userInput").value = text;
        sendMessage();
    };
    
    recognition.onend = function() {
        isListening = false;
        document.getElementById("voiceBtn").classList.remove("listening");
    };
    
    recognition.start();
    isListening = true;
    document.getElementById("voiceBtn").classList.add("listening");
}

function sendMessage() {
    var input = document.getElementById("userInput");
    var text = input.value.trim();
    if (!text) return;
    input.value = "";
    say(text, false);
    updateDealScore(5);
    setTimeout(function() { processInput(text); }, 200);
}

function processInput(text) {
    var lower = text.toLowerCase();
    var matched = false;
    
    // Check for pain points
    Object.keys(PAIN_KEYWORDS).forEach(function(pain) {
        if (matched) return;
        PAIN_KEYWORDS[pain].forEach(function(kw) {
            if (lower.indexOf(kw) > -1 && !matched) {
                matched = true;
                updateDealScore(15);
                showPainResponse(pain, text);
            }
        });
    });
    
    // Check for competitors
    if (!matched) {
        Object.keys(COMPETITORS).forEach(function(key) {
            if (matched) return;
            if (lower.indexOf(key) > -1 || lower.indexOf(COMPETITORS[key].name.toLowerCase()) > -1) {
                matched = true;
                updateDealScore(10);
                unlockAchievement("competitor");
                showBattlecard(key);
            }
        });
    }
    
    // Check for buying signals
    if (!matched) {
        if (lower.indexOf("yes") > -1 || lower.indexOf("interested") > -1 || lower.indexOf("sounds good") > -1 || lower.indexOf("let's do it") > -1) {
            matched = true;
            updateDealScore(25);
            showCloseOpportunity();
        }
    }
    
    // Check for product mentions
    if (!matched) {
        Object.keys(PRODUCTS).forEach(function(name) {
            if (matched) return;
            if (lower.indexOf(name.toLowerCase()) > -1) {
                matched = true;
                showProductDetail(name);
            }
        });
    }
    
    if (!matched) {
        showGenericResponse(text);
    }
}

function togglePayment(method) {
    var btn = document.getElementById("pm-" + method);

    if (idx > -1) {

        btn.classList.remove("selected");

        state.paymentMethods.push(method);

        updateDealScore(3);
    }
}

function finishPaymentMethods() {

    say(methods.map(function(m){return labels[m]}).join(", "), false);

}

function toggleProduct(name) {
    var idx = state.stack.indexOf(name);
    if (idx > -1) {
        state.stack.splice(idx, 1);
    } else {
        state.stack.push(name);
        updateDealScore(5);
    }
    updateStackDisplay();
    renderStack();
}

function updateStackDisplay() {
    var container = document.getElementById("mainStack");
    var total = document.getElementById("stackTotal");
    
    if (!container) return;
    
    if (state.stack.length === 0) {
        container.innerHTML = '<div class="stack-empty">Tap products below to add</div>';
        if (total) total.textContent = "£0";
        return;
    }
    
    var html = "";
    var totalPrice = 0;
    state.stack.forEach(function(name) {
        var p = PRODUCTS[name];
        var price = parseInt(p.price.replace(/[^0-9]/g, "")) || 0;
        totalPrice += price;
        html += '<div class="stack-item"><span>' + name.replace("Square ", "") + '</span><span class="remove" onclick="event.stopPropagation();toggleProduct(\'' + name + '\')">&times;</span></div>';
    });
    container.innerHTML = html;
    if (total) total.textContent = "£" + totalPrice;
    
    // Update product cards
    document.querySelectorAll(".product-card").forEach(function(card) {
        var name = "Square " + card.querySelector("h4").textContent;
        if (state.stack.indexOf(name) > -1) {
            card.classList.add("in-stack");
            card.querySelector(".add-btn").textContent = "✓ Added";
        } else {
            card.classList.remove("in-stack");
            card.querySelector(".add-btn").textContent = "+ Add to stack";
        }
    });
}

// ==================== AR PREVIEW ====================

function takePhoto() {
    // Check for camera support
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("Camera not supported. Try uploading a photo instead.");
        return;
    }
    
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
            var video = document.createElement("video");
            video.srcObject = stream;
            video.play();
            
            setTimeout(function() {
                var canvas = document.createElement("canvas");
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext("2d").drawImage(video, 0, 0);
                
                var img = canvas.toDataURL("image/jpeg");
                setARBackground(img);
                
                stream.getTracks().forEach(function(track) { track.stop(); });
            }, 500);
        })
        .catch(function(err) {
            alert("Could not access camera: " + err.message);
        });
}

function uploadPhoto() {
    var input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = function(e) {
        var file = e.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                setARBackground(ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

function setARBackground(imgSrc) {
    var canvas = document.getElementById("arCanvas");
    canvas.innerHTML = '<img class="bg" src="' + imgSrc + '">';
    
    // Add draggable products from stack
    state.stack.forEach(function(name, i) {
        if (PRODUCTS[name].cat === "hardware") {
            var div = document.createElement("div");
            div.className = "ar-product";
            div.style.left = (100 + i * 80) + "px";
            div.style.top = "100px";
            div.innerHTML = '<img src="https://squareup.com/favicon.ico" alt="' + name + '">';
            div.draggable = true;
            
            div.addEventListener("dragstart", function(e) {
                div.classList.add("dragging");
            });
            div.addEventListener("dragend", function(e) {
                div.classList.remove("dragging");
                div.style.left = e.offsetX + "px";
                div.style.top = e.offsetY + "px";
            });
            
            // Touch support
            var touchStartX, touchStartY;
            div.addEventListener("touchstart", function(e) {
                touchStartX = e.touches[0].clientX - div.offsetLeft;
                touchStartY = e.touches[0].clientY - div.offsetTop;
                div.classList.add("dragging");
            });
            div.addEventListener("touchmove", function(e) {
                e.preventDefault();
                div.style.left = (e.touches[0].clientX - touchStartX) + "px";
                div.style.top = (e.touches[0].clientY - touchStartY) + "px";
            });
            div.addEventListener("touchend", function() {
                div.classList.remove("dragging");
            });
            
            canvas.appendChild(div);
        }
    });
    
    updateDealScore(15);
}
