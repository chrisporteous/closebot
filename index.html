<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIT - Just In Time Sales Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(0, 214, 50, 0.3);
            --sq-green: #00D632;
            --sq-green-glow: rgba(0, 214, 50, 0.4);
            --sq-blue: #006AFF;
            --sq-blue-glow: rgba(0, 106, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
            --accent-purple: #AF52DE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 214, 50, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 106, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .header {
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.98) 0%, rgba(10, 10, 15, 0.9) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: #000;
            box-shadow: 0 0 30px var(--sq-green-glow);
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-sub {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--sq-green);
            font-weight: 600;
        }
        .badge {
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            color: #000;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 120px;
            position: relative;
            z-index: 1;
        }
        .chat {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            min-height: calc(100vh - 240px);
            overflow: hidden;
        }
        .msgs {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .msg {
            display: flex;
            gap: 14px;
            animation: slide-up 0.4s ease-out;
        }
        .msg.usr { flex-direction: row-reverse; }
        .av {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .msg.bot .av {
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            color: #000;
            box-shadow: 0 0 20px var(--sq-green-glow);
        }
        .msg.usr .av {
            background: linear-gradient(135deg, var(--sq-blue) 0%, #0088ff 100%);
            color: #fff;
            box-shadow: 0 0 20px var(--sq-blue-glow);
        }
        .mc {
            max-width: 85%;
            font-size: 15px;
            line-height: 1.7;
        }
        .msg.bot .mc {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 24px;
            border-radius: 20px;
            border-top-left-radius: 6px;
        }
        .msg.usr .mc {
            background: linear-gradient(135deg, var(--sq-blue) 0%, #0066dd 100%);
            padding: 16px 20px;
            border-radius: 20px;
            border-top-right-radius: 6px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }
        .opt {
            padding: 14px 24px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }
        .opt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .opt:hover {
            border-color: var(--sq-green);
            box-shadow: 0 0 30px var(--sq-green-glow);
            transform: translateY(-2px);
        }
        .opt:hover::before { opacity: 0.1; }
        .opt.selected {
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            border-color: transparent;
            color: #000;
            box-shadow: 0 0 30px var(--sq-green-glow);
        }
        .opt.secondary {
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }
        .opt.secondary:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .opt .ico {
            margin-right: 8px;
            font-size: 18px;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--sq-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            margin-top: 8px;
        }
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(10, 10, 15, 0.95) 20%, rgba(10, 10, 15, 0.98) 100%);
            backdrop-filter: blur(20px);
            padding: 20px 24px 28px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 100;
        }
        .input-bar input {
            flex: 1;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        .input-bar input::placeholder { color: var(--text-muted); }
        .input-bar input:focus {
            outline: none;
            border-color: var(--sq-green);
            box-shadow: 0 0 30px var(--sq-green-glow);
        }
        .input-bar button {
            padding: 16px 28px;
            background: linear-gradient(135deg, var(--sq-green) 0%, #00ff44 100%);
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--sq-green-glow);
        }
        .input-bar button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--sq-green-glow);
        }
        .pcard {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 0;
            margin: 12px 0;
            overflow: hidden;
            transition: all 0.3s;
        }
        .pcard:hover {
            border-color: var(--sq-green);
            box-shadow: 0 0 30px rgba(0, 214, 50, 0.15);
            transform: translateY(-2px);
        }
        .pcard-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .pcard-body {
            padding: 16px 18px;
        }
        .pcard h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .pcard p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .pcard-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pcard-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--sq-green);
        }
        .pcard-link {
            font-size: 13px;
            color: var(--sq-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .pcard-link:hover { color: #0088ff; }
        .ptag {
            font-size: 9px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-saas { background: rgba(0, 214, 50, 0.2); color: var(--sq-green); }
        .tag-hardware { background: rgba(175, 82, 222, 0.2); color: var(--accent-purple); }
        .tag-payments { background: rgba(0, 106, 255, 0.2); color: var(--sq-blue); }
        .scard {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 18px 20px;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
        }
        .scard::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }
        .scard.obj::before { background: linear-gradient(180deg, var(--sq-blue) 0%, #0088ff 100%); }
        .scard.cls::before { background: linear-gradient(180deg, var(--accent-orange) 0%, #ffaa00 100%); }
        .scard.cmp::before { background: linear-gradient(180deg, var(--accent-red) 0%, #ff5544 100%); }
        .scard.ctx::before { background: linear-gradient(180deg, var(--sq-green) 0%, #00ff44 100%); }
        .scard h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .sbox {
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }
        .sfu {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
            font-style: italic;
        }
        .wlist {
            margin: 12px 0;
            padding: 0;
            list-style: none;
        }
        .wlist li {
            font-size: 14px;
            padding: 10px 0 10px 28px;
            position: relative;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .wlist li:last-child { border-bottom: none; }
        .wlist li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--sq-green);
            font-weight: bold;
            text-shadow: 0 0 10px var(--sq-green-glow);
        }
        .summary-box {
            background: linear-gradient(135deg, rgba(0, 214, 50, 0.1) 0%, rgba(0, 106, 255, 0.1) 100%);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        .summary-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(0, 214, 50, 0.1) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        .summary-box h3 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        .summary-item:last-child { border-bottom: none; }
        .summary-item .label { color: var(--text-muted); }
        .summary-item .value { font-weight: 600; color: var(--text-primary); }
        .video-section { margin-top: 24px; }
        .video-grid {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .video-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            width: 200px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .video-card:hover {
            border-color: var(--sq-green);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--sq-green-glow);
        }
        .video-card img {
            width: 100%;
            height: 112px;
            object-fit: cover;
        }
        .video-card .play-icon {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }
        .video-card:hover .play-icon {
            background: var(--sq-green);
            border-color: var(--sq-green);
            box-shadow: 0 0 30px var(--sq-green-glow);
        }
        .video-card .play-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-40%, -50%);
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent white;
            transition: border-color 0.3s;
        }
        .video-card:hover .play-icon::after {
            border-color: transparent transparent transparent #000;
        }
        .video-card .vinfo {
            padding: 12px 14px;
        }
        .video-card .vinfo h5 {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
        }
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .video-modal.show { display: flex; }
        .video-modal-content {
            width: 90%;
            max-width: 900px;
            position: relative;
            animation: slide-up 0.3s ease-out;
        }
        .video-modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 32px;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s;
        }
        .video-modal-close:hover {
            color: var(--sq-green);
            transform: scale(1.1);
        }
        .video-modal iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        }
        .restart-btn {
            position: fixed;
            bottom: 90px;
            right: 24px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 99;
        }
        .restart-btn:hover {
            border-color: var(--sq-green);
            color: var(--sq-green);
            box-shadow: 0 0 20px var(--sq-green-glow);
        }
        @media (max-width: 600px) {
            .container { padding: 90px 12px 110px; }
            .video-card { width: calc(50% - 7px); }
            .video-modal iframe { height: 280px; }
            .options { gap: 8px; }
            .opt { padding: 12px 18px; font-size: 13px; }
            .pcard-img { height: 100px; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <div class="logo-icon">JIT</div>
        <div>
            <h1>JIT</h1>
            <div class="logo-sub">Just In Time Intelligence</div>
        </div>
    </div>
    <div class="badge">BETA</div>
</div>
<div class="container">
    <div class="chat"><div class="msgs" id="out"></div></div>
</div>
<button class="restart-btn" onclick="restart()">↺ Start Over</button>
<div class="input-bar">
    <input type="text" id="userInput" placeholder="Type what the merchant said..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>
<div class="video-modal" id="vmodal" onclick="closeVideo()">
    <div class="video-modal-content" onclick="event.stopPropagation()">
        <div class="video-modal-close" onclick="closeVideo()">✕</div>
        <iframe id="vframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
</div>
<script>
var state = {step:0, vertical:null, gpv:null, locations:null, staff:null, paymentMethods:[], notes:[]};

// PRODUCT IMAGES from Square website
var PRODUCT_IMAGES = {
    "Square Reader": "https://images.squarespace-cdn.com/content/v1/583a3246bebafb8212e3a26d/1580328781189-XHQJQVMVXJZ8XQVXQVXQ/square-reader.jpg",
    "Square Terminal": "https://squareup.com/us/en/hardware/terminal/_jcr_content/root/hero/image.img.png/1697665547677.png",
    "Square Register": "https://squareup.com/us/en/hardware/register/_jcr_content/root/hero/image.img.png/1697665547677.png",
    "Square Stand": "https://squareup.com/us/en/hardware/stand/_jcr_content/root/hero/image.img.png/1697665547677.png"
};

// VERTICALS
var VERTICALS = {
    qsr:{name:"Quick Service Restaurant",icon:"🍔",priority:"P0",
        discovery:["What POS system are you using today?","How do you handle busy periods - any queuing issues?","Do you offer online ordering or click & collect?","Are you on any delivery apps like Deliveroo or Uber Eats?"],

        pmf:"Strong PMF for 1-10 locations up to £5M GPV. Includes bars, pubs, clubs.",showDelivery:true},
    retail:{name:"Retail",icon:"🛍️",priority:"P1",
        discovery:["How do you currently track inventory?","Do you sell online as well as in-store?","How many SKUs do you manage?","Do you use barcode scanning?"],
        pmf:"Strong PMF up to 5 locations. Best for clothing, sporting goods, gift shops, pet stores, garden centres.",showDelivery:false},
    beauty:{name:"Beauty & Salons",icon:"💇",priority:"P1",
        discovery:["How do clients currently book appointments?","Do you take deposits for bookings?","How do you handle no-shows?","Do you sell retail products as well as services?"],
        pmf:"Strong PMF up to £1M GPV. Best for hair salons, barbers, nail salons, tattoo studios.",showDelivery:false},
    health:{name:"Health & Wellness",icon:"💪",priority:"P1",
        discovery:["How do clients book sessions with you?","Do you offer memberships or packages?","How do you manage recurring clients?","Do you invoice corporate clients?"],
        pmf:"Strong PMF up to £5M GPV. Best for spas, medi spas, physios, chiropractors, dentists.",showDelivery:false},
    services:{name:"Professional Services",icon:"💼",priority:"P2",
        discovery:["How do you currently invoice clients?","Do clients book appointments online?","How do you handle deposits for larger projects?","Do you take payments over the phone?"],
        pmf:"Moderate PMF. Best for consultants, trainers, photographers with booking needs.",showDelivery:false}
};

// PRODUCTS with UK pricing
var PRODUCTS = {
    "Square Reader":{cat:"hardware",desc:"Compact chip & PIN and contactless card reader. Pairs with phone or tablet. Best for sole traders, markets, mobile sellers.",price:"£19 + VAT",link:"https://squareup.com/help/gb/en/article/5087",img:"https://images.ctfassets.net/2d5q1td6cyxq/5KmPjPJLLPYJwfTqPqPqPq/reader.png"},

// FUNCTIONS
function say(html, isBot) {
    var out = document.getElementById("out");
    var div = document.createElement("div");
    div.className = "msg " + (isBot ? "bot" : "usr");
    div.innerHTML = '<div class="av">' + (isBot ? "JIT" : "IC") + '</div><div class="mc">' + html + '</div>';
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}
function playVideo(vid) {
    document.getElementById("vframe").src = "https://www.youtube-nocookie.com/embed/" + vid + "?autoplay=1&rel=0";
    document.getElementById("vmodal").classList.add("show");
}
function closeVideo() {
    document.getElementById("vmodal").classList.remove("show");
    document.getElementById("vframe").src = "";
}
function restart() {
    state = {step:0, vertical:null, gpv:null, locations:null, staff:null, paymentMethods:[], notes:[]};
    document.getElementById("out").innerHTML = "";
    document.getElementById("userInput").value = "";
    startConversation();
}
function sendMessage() {
    var input = document.getElementById("userInput");
    var text = input.value.trim();
    if (!text) return;
    input.value = "";
    say(text, false);
    state.notes.push(text);
    setTimeout(function() { processInput(text); }, 300);
}
function processInput(text) {
    var lower = text.toLowerCase();
    var matched = false;
    Object.keys(PAIN_RESPONSES).forEach(function(key) {
        if (matched) return;
        PAIN_RESPONSES[key].keywords.forEach(function(kw) {
            if (lower.indexOf(kw) > -1 && !matched) {
                matched = true;
                showContextualResponse(PAIN_RESPONSES[key], text);
            }
        });
    });
    if (!matched) {
        Object.keys(COMPETITORS).forEach(function(key) {
            if (matched) return;
            if (lower.indexOf(key) > -1 || lower.indexOf(COMPETITORS[key].name.toLowerCase()) > -1) {
                matched = true;
                showBattlecard(key);
            }
        });
    }
    if (!matched) {
        if (lower.indexOf("expensive") > -1 || lower.indexOf("cost") > -1 || lower.indexOf("rate") > -1) { matched = true; showObjectionResponse("Too expensive / High rates"); }
        else if (lower.indexOf("think") > -1 || lower.indexOf("consider") > -1) { matched = true; showObjectionResponse("Need to think about it"); }
        else if (lower.indexOf("happy") > -1 || lower.indexOf("fine with") > -1) { matched = true; showObjectionResponse("Happy with current provider"); }
        else if (lower.indexOf("contract") > -1 || lower.indexOf("locked") > -1) { matched = true; showObjectionResponse("Locked into a contract"); }
        else if (lower.indexOf("time") > -1 && (lower.indexOf("don") > -1 || lower.indexOf("no ") > -1 || lower.indexOf("busy") > -1)) { matched = true; showObjectionResponse("Don't have time right now"); }
        else if (lower.indexOf("partner") > -1 || lower.indexOf("accountant") > -1 || lower.indexOf("wife") > -1 || lower.indexOf("husband") > -1) { matched = true; showObjectionResponse("Need to speak to partner/accountant"); }
        else if (lower.indexOf("bad experience") > -1 || lower.indexOf("burnt") > -1 || lower.indexOf("before") > -1) { matched = true; showObjectionResponse("Had bad experience with card machines"); }
        else if (lower.indexOf("upfront") > -1 || lower.indexOf("hardware cost") > -1) { matched = true; showObjectionResponse("Upfront hardware cost concerns"); }
    }
    if (!matched) showGenericResponse(text);
}
function showContextualResponse(pain, originalText) {
    var html = "<div class='scard ctx'><h4>💡 They said:</h4><div class='sbox'><b>\"" + originalText + "\"</b></div>";
    html += "<div style='margin-top:12px'><b>Your response:</b></div><div class='sbox' style='margin-top:8px'>" + pain.response + "</div>";
    html += "<div class='sfu'>👉 " + pain.action + "</div>";
    if (pain.stat) html += "<div class='sfu'>📊 " + pain.stat + "</div>";
    html += "</div>";
    var prod = PRODUCTS[pain.product];
    if (prod) {
        html += "<div class='pcard'>";
        html += "<div class='pcard-body'><h4>" + pain.product + " <span class='ptag tag-" + prod.cat + "'>" + prod.cat + "</span></h4>";
        html += "<p>" + prod.desc + "</p>";
        html += "<div class='pcard-footer'><span class='pcard-price'>" + prod.price + "</span><a href='" + prod.link + "' target='_blank' class='pcard-link'>Learn more →</a></div></div></div>";
    }
    if (pain.videos && VIDEOS[pain.videos]) {
        html += "<div class='video-section'><div class='section-title'>🎬 Show them</div><div class='video-grid'>";
        VIDEOS[pain.videos].forEach(function(vid) {
            html += "<div class='video-card' onclick=\"playVideo('" + vid.vid + "')\"><img src='https://img.youtube.com/vi/" + vid.vid + "/mqdefault.jpg'><div class='play-icon'></div><div class='vinfo'><h5>" + vid.title + "</h5></div></div>";
        });
        html += "</div></div>";
    }
    html += "<div class='options' style='margin-top:16px'><div class='opt' onclick='showCloses()'>🎯 Close the Deal</div><div class='opt secondary' onclick='showObjections()'>🛡️ Handle Objections</div></div>";
    say(html, true);
}
function showObjectionResponse(objKey) {
    var obj = OBJECTIONS[objKey];
    if (!obj) return;
    var html = "<div class='scard obj'><h4>🛡️ \"" + objKey + "\"</h4><div class='sbox'>" + obj.response + "</div>";
    html += "<div class='sfu'>↳ Follow up: \"" + obj.followup + "\"</div>";
    if (obj.stat) html += "<div class='sfu'>📊 " + obj.stat + "</div>";
    html += "</div><div class='options' style='margin-top:16px'><div class='opt' onclick='showCloses()'>🎯 Close the Deal</div><div class='opt secondary' onclick='showObjections()'>🛡️ Other Objections</div></div>";
    say(html, true);
}
function showGenericResponse(text) {
    var html = "<b>I heard:</b> \"" + text + "\"<br><br><span style='color:var(--text-muted)'>Try topics like:</span><div class='options' style='margin-top:12px'>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='fees too high';sendMessage()\">💸 Fees</div>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='slow deposits';sendMessage()\">🏦 Deposits</div>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='need better POS';sendMessage()\">📱 POS</div>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='inventory tracking';sendMessage()\">📦 Inventory</div>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='using SumUp';sendMessage()\">⚔️ SumUp</div>";
    html += "<div class='opt secondary' onclick=\"document.getElementById('userInput').value='using Zettle';sendMessage()\">⚔️ Zettle</div>";
    html += "</div><div class='options' style='margin-top:12px'><div class='opt' onclick='showObjections()'>🛡️ Objections</div><div class='opt' onclick='showCloses()'>🎯 Close</div><div class='opt secondary' onclick='showCompetitors()'>⚔️ Competitors</div></div>";
    say(html, true);
}
function startConversation() {
    say("<div style='font-size:28px;margin-bottom:8px'>👋</div><b style='font-size:18px'>Welcome to JIT</b><br><br><span style='color:var(--text-secondary)'>Your real-time sales intelligence assistant. Let's profile this merchant for tailored recommendations.</span><br><br><div class='section-title'>What type of business?</div><div class='options'>" +
        "<div class='opt' onclick=\"selectVertical('qsr')\"><span class='ico'>🍔</span>QSR</div>" +
        "<div class='opt' onclick=\"selectVertical('fsr')\"><span class='ico'>🍽️</span>FSR</div>" +
        "<div class='opt' onclick=\"selectVertical('retail')\"><span class='ico'>🛍️</span>Retail</div>" +
        "<div class='opt' onclick=\"selectVertical('beauty')\"><span class='ico'>💇</span>Beauty</div>" +
        "<div class='opt' onclick=\"selectVertical('health')\"><span class='ico'>💪</span>Health</div>" +
        "<div class='opt' onclick=\"selectVertical('services')\"><span class='ico'>💼</span>Services</div>" +
        "</div><br><span style='color:var(--text-muted);font-size:13px'>💬 Or type what the merchant is saying below for instant intel</span>", true);
}
function selectVertical(v) {
    state.vertical = v;
    var vert = VERTICALS[v];
    say(vert.icon + " <b>" + vert.name + "</b>", false);
    setTimeout(function() {
        say("<div class='section-title'>Annual card turnover (GPV)?</div><div class='options'>" +
            "<div class='opt' onclick=\"selectGPV('Under £50k')\">Under £50k</div>" +
            "<div class='opt' onclick=\"selectGPV('£50k-£100k')\">£50k-£100k</div>" +
            "<div class='opt' onclick=\"selectGPV('£100k-£250k')\">£100k-£250k</div>" +
            "<div class='opt' onclick=\"selectGPV('£250k-£500k')\">£250k-£500k</div>" +
            "<div class='opt' onclick=\"selectGPV('£500k-£1m')\">£500k-£1m</div>" +
            "<div class='opt' onclick=\"selectGPV('£1m+')\">£1m+</div></div>", true);
    }, 300);
}
function selectGPV(g) {
    state.gpv = g;
    say("<b>" + g + "</b> annual GPV", false);
    setTimeout(function() {
        say("<div class='section-title'>How many locations?</div><div class='options'>" +
            "<div class='opt' onclick=\"selectLocations('1')\">1</div>" +
            "<div class='opt' onclick=\"selectLocations('2-3')\">2-3</div>" +
            "<div class='opt' onclick=\"selectLocations('4-5')\">4-5</div>" +
            "<div class='opt' onclick=\"selectLocations('6-10')\">6-10</div>" +
            "<div class='opt' onclick=\"selectLocations('10+')\">10+</div></div>", true);
    }, 300);
}
function selectLocations(l) {
    state.locations = l;
    say("<b>" + l + "</b> location" + (l === "1" ? "" : "s"), false);
    setTimeout(function() {
        say("<div class='section-title'>How many staff?</div><div class='options'>" +
            "<div class='opt' onclick=\"selectStaff('Just me')\">Just me</div>" +
            "<div class='opt' onclick=\"selectStaff('2-5')\">2-5</div>" +
            "<div class='opt' onclick=\"selectStaff('6-10')\">6-10</div>" +
            "<div class='opt' onclick=\"selectStaff('11-20')\">11-20</div>" +
            "<div class='opt' onclick=\"selectStaff('20+')\">20+</div></div>", true);
    }, 300);
}
function selectStaff(s) {
    state.staff = s;
    say("<b>" + s + "</b> staff", false);
    setTimeout(askPaymentMethods, 300);
}
function askPaymentMethods() {
    var vert = VERTICALS[state.vertical];
    var html = "<div class='section-title'>How do they take payments? <span style='font-weight:400;text-transform:none;letter-spacing:0'>(select all)</span></div><div class='options'>";
    html += "<div class='opt secondary' id='pm-f2f' onclick=\"togglePayment('f2f')\">💳 Face to face</div>";
    html += "<div class='opt secondary' id='pm-online' onclick=\"togglePayment('online')\">🌐 Online</div>";
    html += "<div class='opt secondary' id='pm-phone' onclick=\"togglePayment('phone')\">📞 Phone/VT</div>";
    html += "<div class='opt secondary' id='pm-links' onclick=\"togglePayment('links')\">🔗 Payment Links</div>";
    if (vert.showDelivery) html += "<div class='opt secondary' id='pm-delivery' onclick=\"togglePayment('delivery')\">🛵 Delivery Apps</div>";
    html += "</div><div class='options' style='margin-top:16px'><div class='opt' onclick='finishPaymentMethods()'>Generate Intel →</div></div>";
    say(html, true);
}
function togglePayment(method) {
    var btn = document.getElementById('pm-' + method);
    var idx = state.paymentMethods.indexOf(method);
    if (idx > -1) { state.paymentMethods.splice(idx, 1); btn.classList.remove('selected'); btn.classList.add('secondary'); }
    else { state.paymentMethods.push(method); btn.classList.add('selected'); btn.classList.remove('secondary'); }
}
function finishPaymentMethods() {
    var methods = state.paymentMethods.length ? state.paymentMethods : ['f2f'];
    var labels = {f2f:'Face to face',online:'Online',phone:'Phone/VT',links:'Payment Links',delivery:'Delivery Apps'};
    say("<b>" + methods.map(function(m){return labels[m]}).join(', ') + "</b>", false);
    setTimeout(showRecommendation, 400);
}
function showRecommendation() {
    var v = state.vertical, vert = VERTICALS[v], rec = RECOMMENDATIONS[v], vids = VIDEOS[v] || VIDEOS.general;
    var products = rec.products.slice();
    if (state.paymentMethods.indexOf('online') > -1 && products.indexOf('Square Online') === -1) products.push('Square Online');
    if (state.paymentMethods.indexOf('phone') > -1 && products.indexOf('Virtual Terminal') === -1) products.push('Virtual Terminal');
    if (state.paymentMethods.indexOf('links') > -1 && products.indexOf('Payment Links') === -1) products.push('Payment Links');
    
    var html = "<div class='summary-box'><h3>📋 Merchant Profile</h3>";
    html += "<div class='summary-item'><span class='label'>Business</span><span class='value'>" + vert.icon + " " + vert.name + " (" + vert.priority + ")</span></div>";
    html += "<div class='summary-item'><span class='label'>Annual GPV</span><span class='value'>" + state.gpv + "</span></div>";
    html += "<div class='summary-item'><span class='label'>Locations</span><span class='value'>" + state.locations + "</span></div>";
    html += "<div class='summary-item'><span class='label'>Staff</span><span class='value'>" + state.staff + "</span></div>";
    var labels = {f2f:'Face to face',online:'Online',phone:'Phone/VT',links:'Payment Links',delivery:'Delivery Apps'};
    html += "<div class='summary-item'><span class='label'>Payments</span><span class='value'>" + (state.paymentMethods.length ? state.paymentMethods.map(function(m){return labels[m]}).join(', ') : 'Face to face') + "</span></div>";
    html += "<div class='summary-item'><span class='label'>PMF Note</span><span class='value' style='font-size:12px;font-weight:normal'>" + vert.pmf + "</span></div></div>";
    
    html += "<div class='section-title'>🎯 Discovery Questions</div><ul class='wlist'>";
    vert.discovery.forEach(function(q) { html += "<li>" + q + "</li>"; });
    html += "</ul>";
    
    html += "<div class='section-title'>✅ Why Square Wins Here</div><ul class='wlist'>";
    rec.wins.forEach(function(w) { html += "<li>" + w + "</li>"; });
    if (state.paymentMethods.indexOf('online') > -1) html += "<li>Online store syncs with in-store inventory automatically</li>";
    if (state.paymentMethods.indexOf('delivery') > -1) html += "<li>Delivery app orders flow straight into POS - no re-keying</li>";
    html += "</ul>";
    
    html += "<div class='section-title'>📦 Recommended Products</div>";
    products.forEach(function(pname) {
        var p = PRODUCTS[pname];
        if (p) {
            html += "<div class='pcard'>";
            html += "<div class='pcard-body'><h4>" + pname + " <span class='ptag tag-" + p.cat + "'>" + p.cat + "</span></h4>";
            html += "<p>" + p.desc + "</p>";
            html += "<div class='pcard-footer'><span class='pcard-price'>" + p.price + "</span><a href='" + p.link + "' target='_blank' class='pcard-link'>Learn more →</a></div></div></div>";
        }
    });
    
    var videosToShow = vids.slice(0,3);
    if (state.paymentMethods.indexOf('online') > -1) videosToShow = videosToShow.concat(VIDEOS.online.slice(0,1));
    html += "<div class='video-section'><div class='section-title'>🎬 Demo Videos</div><div class='video-grid'>";
    videosToShow.forEach(function(vid) {
        html += "<div class='video-card' onclick=\"playVideo('" + vid.vid + "')\"><img src='https://img.youtube.com/vi/" + vid.vid + "/mqdefault.jpg'><div class='play-icon'></div><div class='vinfo'><h5>" + vid.title + "</h5></div></div>";
    });
    html += "</div></div>";
    
    html += "<div class='options' style='margin-top:24px'><div class='opt' onclick='showObjections()'>🛡️ Objections</div><div class='opt' onclick='showCloses()'>🎯 Close</div><div class='opt secondary' onclick='showCompetitors()'>⚔️ Competitor</div></div>";
    html += "<br><span style='color:var(--text-muted);font-size:13px'>💬 Type what the merchant says for contextual intel</span>";
    say(html, true);
}
function showObjections() {
    say("🛡️ <b>Objection Handling</b>", false);
    var html = "<b>Based on Win/Loss Analysis - top objections and responses:</b>";
    Object.keys(OBJECTIONS).forEach(function(obj) {
        var o = OBJECTIONS[obj];
        html += "<div class='scard obj'><h4>\"" + obj + "\"</h4><div class='sbox'>" + o.response + "</div>";
        html += "<div class='sfu'>↳ \"" + o.followup + "\"</div>";
        if (o.stat) html += "<div class='sfu'>📊 " + o.stat + "</div>";
        html += "</div>";
    });
    html += "<div class='options' style='margin-top:16px'><div class='opt' onclick='showCloses()'>🎯 Close</div><div class='opt secondary' onclick='showCompetitors()'>⚔️ Competitor</div></div>";
    say(html, true);
}
function showCloses() {
    say("🎯 <b>Close the Deal</b>", false);
    var html = "<b>Pick the right close for the situation:</b>";
    Object.keys(CLOSES).forEach(function(key) {
        var c = CLOSES[key];
        html += "<div class='scard cls'><h4>" + c.icon + " " + c.name + "</h4><div class='sbox'>\"" + c.script + "\"</div><div class='sfu'>When: " + c.when + "</div></div>";
    });
    html += "<div class='options' style='margin-top:16px'><div class='opt' onclick='showObjections()'>🛡️ Objections</div><div class='opt secondary' onclick='restart()'>↺ New Merchant</div></div>";
    say(html, true);
}
function showCompetitors() {
    say("⚔️ <b>Competitor Battlecards</b>", false);
    var html = "<b>Which competitor are they using/mentioning?</b><div class='options' style='margin-top:12px'>";
    Object.keys(COMPETITORS).forEach(function(key) { html += "<div class='opt secondary' onclick=\"showBattlecard('" + key + "')\">" + COMPETITORS[key].name + "</div>"; });
    html += "</div>";
    say(html, true);
}
function showBattlecard(key) {
    var c = COMPETITORS[key];
    say("vs <b>" + c.name + "</b>", false);
    var html = "<b>" + c.name + "</b> <span style='color:var(--text-muted)'>(" + c.type + ")</span>";
    html += "<div class='scard cmp'><h4>💰 Their Pricing</h4><div class='sbox'>HW: " + c.hwPricing + "<br>Rates: " + c.rates + "</div></div>";
    html += "<div class='scard cmp'><h4>❌ Their Weaknesses</h4><ul class='wlist'>";
    c.weaknesses.forEach(function(w) { html += "<li>" + w + "</li>"; });
    html += "</ul></div>";
    html += "<div class='scard ctx'><h4>✅ Where We Win</h4><ul class='wlist'>";
    c.wins.forEach(function(w) { html += "<li>" + w + "</li>"; });
    html += "</ul></div>";
    html += "<div class='scard cls'><h4>💬 Say This</h4><div class='sbox'>\"" + c.counter + "\"</div></div>";
    html += "<div class='options' style='margin-top:16px'><div class='opt' onclick='showCloses()'>🎯 Close</div><div class='opt secondary' onclick='showCompetitors()'>← Back</div></div>";
    say(html, true);
}
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeVideo(); });
startConversation();
</script>
