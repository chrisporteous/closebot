<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloseBot - IC Sales Assistant</title>
    <style>
        :root {
            --sq-black: #000000;
            --sq-white: #FFFFFF;
            --sq-green: #00D632;
            --sq-gray-100: #F7F7F7;
            --sq-gray-200: #E6E6E6;
            --sq-gray-300: #CCCCCC;
            --sq-gray-500: #787878;
            --sq-gray-700: #3D3D3D;
            --sq-blue: #006AFF;
            --sq-red: #CC0000;
            --sq-orange: #FF9500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: var(--sq-gray-100);
            min-height: 100vh;
        }

        .header {
            background: var(--sq-black);
            color: var(--sq-white);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { font-size: 20px; font-weight: 600; }
        .header .badge {
            background: var(--sq-green);
            color: var(--sq-black);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 52px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .input-panel {
            width: 300px;
            background: var(--sq-white);
            border-right: 1px solid var(--sq-gray-200);
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--sq-gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .vertical-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .v-btn {
            padding: 12px 8px;
            border: 2px solid var(--sq-gray-200);
            border-radius: 8px;
            background: var(--sq-white);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .v-btn:hover { border-color: var(--sq-gray-300); background: var(--sq-gray-100); }
        .v-btn.active { background: var(--sq-black); color: var(--sq-white); border-color: var(--sq-black); }

        .v-btn .icon { font-size: 18px; display: block; margin-bottom: 4px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--sq-gray-200);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--sq-black); }
        .form-group textarea { resize: none; height: 80px; }

        .btn-go {
            width: 100%;
            padding: 14px;
            background: var(--sq-black);
            color: var(--sq-white);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-go:hover { background: var(--sq-gray-700); }
        .btn-go:active { transform: scale(0.98); }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--sq-white);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            font-weight: bold;
        }

        .message.bot .avatar { background: var(--sq-black); color: var(--sq-white); }
        .message.user .avatar { background: var(--sq-gray-200); }

        .message-content {
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: var(--sq-gray-100);
            padding: 14px 18px;
            border-radius: 16px;
            border-top-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--sq-black);
            color: var(--sq-white);
            padding: 14px 18px;
            border-radius: 16px;
            border-top-right-radius: 4px;
        }

        .product-card {
            background: var(--sq-white);
            border: 1px solid var(--sq-gray-200);
            border-left: 4px solid var(--sq-green);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 8px 0;
        }

        .product-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .product-card p { font-size: 13px; color: var(--sq-gray-700); }

        .product-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .tag-saas { background: #E8F5E9; color: #2E7D32; }
        .tag-hardware { background: #F3E5F5; color: #7B1FA2; }
        .tag-payments { background: #E3F2FD; color: #1565C0; }

        .wins-list {
            margin: 12px 0;
            padding: 0;
            list-style: none;
        }

        .wins-list li {
            font-size: 13px;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
            color: var(--sq-gray-700);
        }

        .wins-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--sq-green);
            font-weight: bold;
        }

        .action-tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .action-tab {
            padding: 10px 18px;
            background: var(--sq-white);
            border: 2px solid var(--sq-black);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-tab:hover { background: var(--sq-black); color: var(--sq-white); }

        .action-tab.secondary {
            border-color: var(--sq-gray-300);
            color: var(--sq-gray-700);
        }

        .action-tab.secondary:hover {
            border-color: var(--sq-gray-500);
            background: var(--sq-gray-100);
            color: var(--sq-black);
        }

        .script-card {
            background: var(--sq-white);
            border: 1px solid var(--sq-gray-200);
            border-radius: 8px;
            padding: 14px;
            margin: 8px 0;
        }

        .script-card.objection { border-left: 4px solid var(--sq-blue); }
        .script-card.close { border-left: 4px solid var(--sq-orange); }
        .script-card.competitor { border-left: 4px solid var(--sq-red); }

        .script-card h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--sq-gray-700);
        }

        .script-box {
            background: var(--sq-gray-100);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--sq-black);
        }

        .script-followup {
            font-size: 12px;
            color: var(--sq-gray-500);
            margin-top: 8px;
            font-style: italic;
        }

        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--sq-gray-500);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; height: auto; }
            .input-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--sq-gray-200); }
            .chat-panel { min-height: 70vh; }
            .vertical-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:center;">
            <h1>CloseBot</h1>
            <span class="badge">BETA</span>
        </div>
        <div style="font-size:12px;color:var(--sq-gray-300);">Partner Portal</div>
    </div>

    <div class="main-container">
        <div class="input-panel">
            <div class="section-label">Vertical</div>
            <div class="vertical-grid" id="verticalGrid">
                <button type="button" class="v-btn" onclick="selectVertical(this, 'restaurant_fsr')"><span class="icon">🍽️</span><span>FSR</span></button>
                <button type="button" class="v-btn" onclick="selectVertical(this, 'restaurant_qsr')"><span class="icon">🍔</span><span>QSR</span></button>
                <button type="button" class="v-btn" onclick="selectVertical(this, 'retail')"><span class="icon">🛍️</span><span>Retail</span></button>
                <button type="button" class="v-btn" onclick="selectVertical(this, 'services')"><span class="icon">💼</span><span>Services</span></button>
                <button type="button" class="v-btn" onclick="selectVertical(this, 'beauty')"><span class="icon">💇</span><span>Beauty</span></button>
                <button type="button" class="v-btn" onclick="selectVertical(this, 'health')"><span class="icon">💪</span><span>Health</span></button>
            </div>

            <div class="form-group">
                <label>Annual GPV</label>
                <select id="gpv">
                    <option value="">Select...</option>
                    <option value="tier1">Under £50k</option>
                    <option value="tier2">£50k - £100k</option>
                    <option value="tier3">£100k - £250k</option>
                    <option value="tier4">£250k - £500k</option>
                    <option value="tier5">£500k+</option>
                </select>
            </div>

            <div class="form-group">
                <label>Pain Points</label>
                <textarea id="pain" placeholder="High fees, slow deposits, using Zettle, locked in contract..."></textarea>
            </div>

            <button type="button" class="btn-go" onclick="go()">Get Recommendations →</button>
        </div>

        <div class="chat-panel">
            <div class="chat-messages" id="chat">
                <div class="message bot">
                    <div class="avatar">CB</div>
                    <div class="message-content">
                        <strong>Hey!</strong> Select a vertical and tell me about the seller. I'll give you product recs, then you can tap for objection handling or closing scripts when you need them.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="knowledge.js"></script>
    <script>
        var selectedV = null;

        function selectVertical(btn, vertical) {
            var buttons = document.querySelectorAll('.v-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');
            selectedV = vertical;
        }

        function msg(html, isBot) {
            var c = document.getElementById('chat');
            var d = document.createElement('div');
            d.className = 'message ' + (isBot ? 'bot' : 'user');
            d.innerHTML = '<div class="avatar">' + (isBot ? 'CB' : 'You') + '</div><div class="message-content">' + html + '</div>';
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        function typing(show) {
            var existing = document.getElementById('typing');
            if (existing) existing.remove();
            if (show) {
                var c = document.getElementById('chat');
                var d = document.createElement('div');
                d.className = 'message bot';
                d.id = 'typing';
                d.innerHTML = '<div class="avatar">CB</div><div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>';
                c.appendChild(d);
                c.scrollTop = c.scrollHeight;
            }
        }

        function go() {
            if (!selectedV) { 
                msg("Pick a vertical first 👆", true); 
                return; 
            }
            
            var gpv = document.getElementById('gpv').value;
            var pain = document.getElementById('pain').value.toLowerCase();
            var v = KNOWLEDGE.verticals[selectedV];

            msg('<strong>' + v.icon + ' ' + v.name + '</strong>' + (gpv ? ' · ' + gpv : '') + (pain ? '<br><em>' + pain + '</em>' : ''), false);

            typing(true);
            setTimeout(function() {
                typing(false);
                showProducts(v, pain);
            }, 400);
        }

        function showProducts(v, pain) {
            var html = '<strong>Here's what I'd recommend:</strong>';
            
            html += '<ul class="wins-list">';
            var wins = v.keyWins.slice(0, 3);
            for (var i = 0; i < wins.length; i++) {
                html += '<li>' + wins[i] + '</li>';
            }
            html += '</ul>';

            var prods = v.primary.slice(0, 3);
            for (var j = 0; j < prods.length; j++) {
                var p = KNOWLEDGE.products[prods[j]];
                if (p) {
                    var tagClass = 'tag-' + p.category;
                    html += '<div class="product-card"><h4>' + p.name + '<span class="product-tag ' + tagClass + '">' + p.category + '</span></h4><p>' + p.pitch + '</p></div>';
                }
            }

            var comp = null;
            var compKeys = Object.keys(KNOWLEDGE.competitors);
            for (var k = 0; k < compKeys.length; k++) {
                if (pain.indexOf(compKeys[k]) !== -1) {
                    comp = KNOWLEDGE.competitors[compKeys[k]];
                    break;
                }
            }

            html += '<div class="action-tabs">';
            html += '<div class="action-tab" onclick="showObjections()">🛡️ Handle Objections</div>';
            html += '<div class="action-tab" onclick="showClose()">🎯 Close the Deal</div>';
            if (comp) {
                html += '<div class="action-tab" onclick="showBattlecard('' + comp.name + '')">⚔️ vs ' + comp.name + '</div>';
            }
            html += '<div class="action-tab secondary" onclick="reset()">↺ New Seller</div>';
            html += '</div>';

            msg(html, true);
        }

        function showObjections() {
            msg("What objections are you hearing?", false);
            typing(true);
            setTimeout(function() {
                typing(false);
                var html = '<strong>Common objections:</strong>';
                
                var top = ["too expensive", "happy with current provider", "need to think about it", "locked in contract"];
                for (var i = 0; i < top.length; i++) {
                    var o = KNOWLEDGE.objections[top[i]];
                    if (o) {
                        html += '<div class="script-card objection"><h4>"' + top[i] + '"</h4><div class="script-box">' + o.response + '</div><div class="script-followup">↳ ' + o.followUp + '</div></div>';
                    }
                }

                html += '<div class="action-tabs">';
                html += '<div class="action-tab" onclick="showMoreObjections()">More objections</div>';
                html += '<div class="action-tab" onclick="showClose()">🎯 Close the Deal</div>';
                html += '</div>';

                msg(html, true);
            }, 300);
        }

        function showMoreObjections() {
            var html = '';
            var more = ["rates are too high", "don't have time", "need to check with partner/accountant", "what if it breaks"];
            for (var i = 0; i < more.length; i++) {
                var o = KNOWLEDGE.objections[more[i]];
                if (o) {
                    html += '<div class="script-card objection"><h4>"' + more[i] + '"</h4><div class="script-box">' + o.response + '</div><div class="script-followup">↳ ' + o.followUp + '</div></div>';
                }
            }
            msg(html, true);
        }

        function showClose() {
            msg("Ready to close?", false);
            typing(true);
            setTimeout(function() {
                typing(false);
                var html = '<strong>Pick your close:</strong>';

                var closes = ['assumptive', 'trial', 'urgency', 'summary'];
                for (var i = 0; i < closes.length; i++) {
                    var c = KNOWLEDGE.closingTechniques[closes[i]];
                    if (c) {
                        html += '<div class="script-card close"><h4>' + c.icon + ' ' + c.name + '</h4><div class="script-box">' + c.script + '</div><div class="script-followup">Use when: ' + c.when + '</div></div>';
                    }
                }

                html += '<div class="action-tabs">';
                html += '<div class="action-tab secondary" onclick="reset()">↺ New Seller</div>';
                html += '</div>';

                msg(html, true);
            }, 300);
        }

        function showBattlecard(name) {
            msg("Tell me about " + name, false);
            typing(true);
            setTimeout(function() {
                typing(false);
                var comp = null;
                var compKeys = Object.keys(KNOWLEDGE.competitors);
                for (var i = 0; i < compKeys.length; i++) {
                    if (KNOWLEDGE.competitors[compKeys[i]].name === name) {
                        comp = KNOWLEDGE.competitors[compKeys[i]];
                        break;
                    }
                }

                if (comp) {
                    var html = '<strong>vs ' + comp.name + '</strong> <em>(' + comp.type + ')</em>';
                    html += '<div class="script-card competitor"><h4>Their weaknesses:</h4><ul class="wins-list">';
                    var weaknesses = comp.weaknesses.slice(0, 4);
                    for (var j = 0; j < weaknesses.length; j++) {
                        html += '<li>' + weaknesses[j] + '</li>';
                    }
                    html += '</ul><div class="script-box" style="margin-top:12px;"><strong>Say:</strong> "' + comp.winningScript + '"</div></div>';

                    html += '<div class="action-tabs">';
                    html += '<div class="action-tab" onclick="showClose()">🎯 Close the Deal</div>';
                    html += '</div>';

                    msg(html, true);
                }
            }, 300);
        }

        function reset() {
            selectedV = null;
            var buttons = document.querySelectorAll('.v-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            document.getElementById('gpv').value = '';
            document.getElementById('pain').value = '';
            document.getElementById('chat').innerHTML = '';
            msg('<strong>Ready for the next one.</strong> Select a vertical to start.', true);
        }
    </script>
</body>
</html>
